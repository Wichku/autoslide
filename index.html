<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wk Auto slide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .pdf-page {
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin: 0 auto 3rem auto;
            position: relative;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            display: grid;
            align-content: stretch;
        }
        .portrait-page { aspect-ratio: 210 / 297; width: 92vw; max-width: 600px; }
        .landscape-page { aspect-ratio: 297 / 210; width: 95vw; max-width: 850px; }
        
        .cell-wrapper {
            position: relative;
            height: 100%;
            width: 100%;
            min-height: 0;
            display: flex;
            overflow: hidden;
        }

        .image-cell {
            position: relative;
            background: #ffffff;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            flex: 1;
        }
        .image-cell.selected { border: 4px solid #3b82f6; z-index: 20; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
        
        .image-cell img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .insertion-cursor {
            width: 4px;
            height: 80%;
            background: #3b82f6;
            border-radius: 20px;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
            animation: pulse 1.5s infinite;
            display: none;
        }
        .active .insertion-cursor { display: block; }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scaleY(0.9); }
            50% { opacity: 1; transform: scaleY(1); }
            100% { opacity: 0.4; transform: scaleY(0.9); }
        }

        .insertion-zone {
            width: 30px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: cell;
            z-index: 30;
            transition: all 0.2s;
        }
        .insertion-zone:hover { background: rgba(59, 130, 246, 0.03); }

        .page-num-label {
            position: absolute;
            bottom: 12px;
            right: 18px;
            font-size: 14px;
            font-weight: 800;
            color: #94a3b8;
            pointer-events: none;
        }

        #gesture-area {
            touch-action: none;
            cursor: grab;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .editing-frame {
            position: absolute;
            border: 2px dashed rgba(255,255,255,0.4);
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
        }

        .delete-corner-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
            z-index: 50;
            cursor: pointer;
            border: 2px solid white;
            transition: transform 0.2s;
        }
        .delete-corner-btn:active { transform: scale(0.8); }
    </style>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-[60] bg-white/90 backdrop-blur-xl border-b border-slate-200 px-1 py-2 shadow-sm">
        <div class="max-w-[1400px] mx-auto flex items-center justify-between gap-1">
            
            <div class="flex items-center gap-1">
                <h1 class="text-[10px] font-black tracking-tighter text-slate-900 whitespace-nowrap hidden md:block uppercase mr-1">Wk Auto slide</h1>
                
                <div class="relative group">
                    <button id="grid-picker-btn" class="flex items-center gap-1.5 bg-slate-100 px-2 py-1 rounded-lg border border-slate-200 hover:bg-slate-200 transition-colors">
                        <div class="grid grid-cols-2 gap-0.5 w-2.5 h-2.5">
                            <div class="bg-slate-400 rounded-[1px]"></div>
                            <div class="bg-slate-400 rounded-[1px]"></div>
                            <div class="bg-slate-400 rounded-[1px]"></div>
                            <div class="bg-slate-400 rounded-[1px]"></div>
                        </div>
                        <span id="grid-display-text" class="text-[9px] font-bold text-slate-900">2 × 3</span>
                    </button>
                    
                    <div id="grid-popover" class="absolute top-full left-0 mt-2 p-3 bg-white rounded-xl shadow-2xl border border-slate-200 hidden z-[70] min-w-[130px]">
                        <div class="text-[8px] font-black uppercase text-slate-400 mb-2 tracking-widest text-center">Select Layout</div>
                        <div class="grid grid-cols-3 gap-1.5 mb-2" id="visual-matrix"></div>
                        <div id="matrix-status" class="text-[9px] font-bold text-blue-600 text-center">2 by 3 Table</div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-1 flex-1 justify-center">
                <!-- Spacing Control -->
                <div class="hidden sm:flex items-center gap-1 bg-slate-50 px-2 py-1 rounded-full border border-slate-200 mr-1">
                    <input type="range" id="margin-input" min="0" max="25" value="0" class="w-10 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <span id="margin-val" class="text-[8px] font-bold text-blue-600 w-6">0mm</span>
                </div>

                <!-- Orientation Toggle -->
                <button id="orient-toggle" class="p-1.5 bg-white rounded-full border border-slate-200 shadow-sm hover:bg-slate-50 transition-colors text-slate-600">
                    <svg id="icon-portrait" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><rect x="6" y="3" width="12" height="18" rx="2" /></svg>
                    <svg id="icon-landscape" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><rect x="3" y="6" width="18" height="12" rx="2" /></svg>
                </button>

                <!-- Page Num Toggle # -->
                <button id="page-num-btn" class="p-1.5 bg-blue-50 text-blue-600 rounded-full border border-blue-200 shadow-sm transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" />
                    </svg>
                </button>

                <button id="clear-btn" class="w-14 py-1 rounded-full text-[8px] font-black uppercase transition-all border border-slate-200 bg-slate-50 text-slate-400 hover:bg-slate-100 text-center overflow-hidden">Clear</button>
            </div>

            <div class="flex items-center gap-1">
                <button id="add-blank-btn" class="p-1.5 bg-slate-100 text-slate-600 rounded-full shadow-sm hover:bg-slate-200 active:scale-90 transition-all border border-slate-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                </button>

                <button id="upload-trigger" class="p-1.5 bg-slate-900 text-white rounded-full shadow-lg active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                </button>
                <input type="file" id="file-input" multiple accept="image/*" class="hidden">

                <button id="generate-btn" disabled class="p-1.5 bg-blue-600 text-white rounded-full shadow-lg shadow-blue-100 disabled:opacity-20 active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                </button>
            </div>
        </div>
    </header>

    <main id="main-canvas" class="p-4 sm:p-8 min-h-[calc(100vh-60px)]">
        <div id="preview-grid" class="flex flex-col items-center"></div>
    </main>

    <div id="edit-panel" class="fixed inset-0 z-[100] hidden flex flex-col bg-black">
        <div class="flex items-center justify-between p-4 text-white safe-top">
            <button id="cancel-edit" class="text-sm font-bold opacity-70">Cancel</button>
            <span class="text-xs font-black tracking-widest uppercase">Adjust</span>
            <button id="save-edit" class="px-6 py-2 bg-blue-600 rounded-full text-sm font-black text-white">Done</button>
        </div>
        
        <div class="flex-1 relative flex items-center justify-center overflow-hidden">
            <div id="gesture-area">
                <img src="" id="editing-img" class="absolute pointer-events-none origin-center" style="transform: translate(0px, 0px) scale(1);">
                <!-- Visual Guideline for Cell Margin -->
                <div id="editing-frame" class="editing-frame"></div>
            </div>
        </div>

        <div class="p-6 bg-zinc-950/90 backdrop-blur-md space-y-8 pb-12">
            <div class="flex items-center justify-between text-[10px] font-bold text-zinc-500 uppercase">
                <button id="reset-edit" class="hover:text-white px-4 py-2 border border-zinc-800 rounded-xl">Center</button>
                <button id="delete-btn-full" class="text-red-500 font-black px-4 py-2 border border-red-900/30 rounded-xl bg-red-500/10">Remove Photo</button>
            </div>
            <div class="flex items-center gap-6">
                <span class="text-white text-[10px] font-black">ZOOM</span>
                <input type="range" id="input-zoom" min="50" max="800" value="100" class="flex-1 h-1.5 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
            </div>
        </div>
    </div>

    <script>
        let images = []; 
        let gridCols = 2;
        let gridRows = 3;
        let photosPerPage = 6;
        let marginSize = 0; // mm
        let selectedIndex = null;
        let editingIndex = null;
        let insertionIndex = 0;
        let clearConfirming = false;
        let orientation = 'p'; 
        let showPageNums = true;

        let currentScale = 1;
        let currentX = 0;
        let currentY = 0;
        let startX, startY, startDist;

        const BLANK_PHOTO_SRC = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==";

        const fileInput = document.getElementById('file-input');
        const uploadTrigger = document.getElementById('upload-trigger');
        const previewGrid = document.getElementById('preview-grid');
        const generateBtn = document.getElementById('generate-btn');
        const orientToggle = document.getElementById('orient-toggle');
        const pageNumBtn = document.getElementById('page-num-btn');
        const iconPortrait = document.getElementById('icon-portrait');
        const iconLandscape = document.getElementById('icon-landscape');
        const editPanel = document.getElementById('edit-panel');
        const clearBtn = document.getElementById('clear-btn');
        const addBlankBtn = document.getElementById('add-blank-btn');
        const gridPickerBtn = document.getElementById('grid-picker-btn');
        const gridPopover = document.getElementById('grid-popover');
        const visualMatrix = document.getElementById('visual-matrix');
        const matrixStatus = document.getElementById('matrix-status');
        const gridDisplayText = document.getElementById('grid-display-text');
        const marginInput = document.getElementById('margin-input');
        const marginVal = document.getElementById('margin-val');

        function initGridPicker() {
            visualMatrix.innerHTML = '';
            for (let r = 1; r <= 4; r++) {
                for (let c = 1; c <= 3; c++) {
                    const square = document.createElement('div');
                    square.className = 'w-8 h-8 rounded-md border-2 border-slate-100 cursor-pointer transition-all hover:scale-105';
                    square.dataset.r = r;
                    square.dataset.c = c;
                    square.onmouseenter = () => highlightMatrix(r, c);
                    square.onclick = () => selectMatrix(r, c);
                    visualMatrix.appendChild(square);
                }
            }
            highlightMatrix(gridRows, gridCols);
        }

        function highlightMatrix(rows, cols) {
            const squares = visualMatrix.querySelectorAll('div');
            squares.forEach(s => {
                const r = parseInt(s.dataset.r);
                const c = parseInt(s.dataset.c);
                if (r <= rows && c <= cols) {
                    s.classList.replace('border-slate-100', 'border-blue-500');
                    s.classList.add('bg-blue-50');
                } else {
                    s.classList.replace('border-blue-500', 'border-slate-100');
                    s.classList.remove('bg-blue-50');
                }
            });
            matrixStatus.textContent = `${cols} by ${rows} Table`;
        }

        function selectMatrix(rows, cols) {
            gridCols = cols;
            gridRows = rows;
            photosPerPage = gridCols * gridRows;
            gridDisplayText.textContent = `${gridCols} × ${gridRows}`;
            gridPopover.classList.add('hidden');
            renderPreview();
        }

        gridPickerBtn.onclick = (e) => { e.stopPropagation(); gridPopover.classList.toggle('hidden'); highlightMatrix(gridRows, gridCols); };
        window.addEventListener('click', (e) => { 
            if (!gridPopover.contains(e.target) && e.target !== gridPickerBtn) gridPopover.classList.add('hidden'); 
            // Deselect logic
            if (!e.target.closest('.image-cell') && !e.target.closest('header') && !e.target.closest('#edit-panel')) {
                selectedIndex = null;
                renderPreview();
            }
        });

        uploadTrigger.onclick = () => fileInput.click();
        fileInput.onchange = e => handleFiles(e.target.files);
        
        orientToggle.onclick = () => {
            orientation = (orientation === 'p') ? 'l' : 'p';
            iconPortrait.classList.toggle('hidden', orientation === 'l');
            iconLandscape.classList.toggle('hidden', orientation === 'p');
            renderPreview();
        };

        pageNumBtn.onclick = () => {
            showPageNums = !showPageNums;
            pageNumBtn.className = showPageNums ? "p-1.5 bg-blue-50 text-blue-600 rounded-full border border-blue-200 shadow-sm transition-colors" : "p-1.5 bg-slate-50 text-slate-400 rounded-full border border-slate-200 transition-colors";
            renderPreview();
        };

        marginInput.oninput = (e) => {
            marginSize = parseInt(e.target.value);
            marginVal.textContent = `${marginSize}mm`;
            renderPreview();
        };

        addBlankBtn.onclick = () => {
            images.splice(insertionIndex, 0, { src: BLANK_PHOTO_SRC, zoom: 100, x: 0, y: 0, isBlank: true });
            insertionIndex++;
            renderPreview();
        };

        clearBtn.onclick = (e) => {
            e.stopPropagation();
            if (!clearConfirming) {
                clearConfirming = true;
                clearBtn.textContent = 'Confirm';
                clearBtn.className = "w-14 py-1 rounded-full text-[8px] font-black uppercase bg-red-600 text-white shadow-lg text-center overflow-hidden";
                setTimeout(() => { if (clearConfirming) resetClearBtn(); }, 3000);
            } else {
                images = []; insertionIndex = 0; selectedIndex = null;
                resetClearBtn(); renderPreview();
            }
        };

        function resetClearBtn() {
            clearConfirming = false;
            clearBtn.textContent = 'Clear';
            clearBtn.className = "w-14 py-1 rounded-full text-[8px] font-black uppercase border border-slate-200 bg-slate-50 text-slate-400 hover:bg-slate-100 text-center overflow-hidden";
        }

        async function handleFiles(files) {
            const validFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            for (let file of validFiles) {
                const reader = new FileReader();
                await new Promise(resolve => {
                    reader.onload = (e) => {
                        images.splice(insertionIndex, 0, { src: e.target.result, zoom: 100, x: 0, y: 0 });
                        insertionIndex++;
                        resolve();
                    };
                    reader.readAsDataURL(file);
                });
            }
            fileInput.value = '';
            renderPreview();
        }

        function handleCellClick(e, index) {
            e.stopPropagation();
            if (index >= images.length) {
                selectedIndex = null;
                renderPreview();
                return;
            }

            if (selectedIndex === null) {
                selectedIndex = index; renderPreview();
            } else if (selectedIndex === index) {
                openEditPanel(index); selectedIndex = null;
            } else {
                const temp = images[selectedIndex];
                images[selectedIndex] = images[index];
                images[index] = temp;
                selectedIndex = null; renderPreview();
            }
        }

        function deletePhoto(index) {
            images.splice(index, 1);
            if (insertionIndex > index) insertionIndex--;
            if (selectedIndex === index) selectedIndex = null;
            renderPreview();
        }

        const gestureArea = document.getElementById('gesture-area');
        const editingImg = document.getElementById('editing-img');
        const editingFrame = document.getElementById('editing-frame');

        function openEditPanel(index) {
            editingIndex = index;
            const data = images[index];
            if (!data) return;
            
            editingImg.src = data.src;
            currentScale = data.zoom / 100;
            currentX = data.x;
            currentY = data.y;
            
            // Set frame aspect ratio based on grid
            const containerWidth = gestureArea.clientWidth;
            const containerHeight = gestureArea.clientHeight;
            const pageRatio = orientation === 'p' ? (210/297) : (297/210);
            
            let frameW, frameH;
            if (containerWidth / containerHeight > pageRatio) {
                frameH = containerHeight * 0.8;
                frameW = frameH * pageRatio;
            } else {
                frameW = containerWidth * 0.8;
                frameH = frameW / pageRatio;
            }
            
            // Further divide by cols/rows to match preview cell
            const cellW = frameW / gridCols;
            const cellH = frameH / gridRows;
            
            editingFrame.style.width = `${cellW}px`;
            editingFrame.style.height = `${cellH}px`;
            
            updateTransform();
            document.getElementById('input-zoom').value = data.zoom;
            editPanel.classList.remove('hidden');
        }

        function updateTransform() {
            if (editingIndex === null || !images[editingIndex]) return;
            editingImg.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
            images[editingIndex].x = currentX;
            images[editingIndex].y = currentY;
            images[editingIndex].zoom = Math.round(currentScale * 100);
            document.getElementById('input-zoom').value = images[editingIndex].zoom;
        }

        gestureArea.onmousedown = e => {
            startX = e.clientX - currentX; startY = e.clientY - currentY;
            const handleMouseMove = ev => { currentX = ev.clientX - startX; currentY = ev.clientY - startY; updateTransform(); };
            const handleMouseUp = () => { window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleMouseUp); };
            window.addEventListener('mousemove', handleMouseMove); window.addEventListener('mouseup', handleMouseUp);
        };

        gestureArea.ontouchstart = e => {
            if (e.touches.length === 1) { startX = e.touches[0].clientX - currentX; startY = e.touches[0].clientY - currentY; }
            else if (e.touches.length === 2) { startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
        };

        gestureArea.ontouchmove = e => {
            e.preventDefault();
            if (e.touches.length === 1) { currentX = e.touches[0].clientX - startX; currentY = e.touches[0].clientY - startY; }
            else if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const delta = dist / startDist; currentScale *= delta; startDist = dist;
            }
            updateTransform();
        };

        document.getElementById('input-zoom').oninput = (e) => { currentScale = e.target.value / 100; updateTransform(); };
        document.getElementById('reset-edit').onclick = () => { currentScale = 1; currentX = 0; currentY = 0; updateTransform(); };
        document.getElementById('save-edit').onclick = () => { editPanel.classList.add('hidden'); renderPreview(); };
        document.getElementById('cancel-edit').onclick = () => editPanel.classList.add('hidden');
        document.getElementById('delete-btn-full').onclick = () => { images.splice(editingIndex, 1); if (insertionIndex > editingIndex) insertionIndex--; editPanel.classList.add('hidden'); renderPreview(); };

        function renderPreview() {
            previewGrid.innerHTML = '';
            const totalPages = Math.max(1, Math.ceil(images.length / photosPerPage));
            generateBtn.disabled = images.length === 0;

            for (let p = 0; p < totalPages; p++) {
                const page = document.createElement('div');
                page.className = `pdf-page ${orientation === 'p' ? 'portrait-page' : 'landscape-page'} rounded-2xl`;
                
                const mmToPx = (orientation === 'p' ? 600/210 : 850/297);
                const marginPx = marginSize * mmToPx;
                page.style.padding = `${marginPx}px`;
                page.style.gap = `${marginPx}px`;
                page.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;
                page.style.gridTemplateRows = `repeat(${gridRows}, 1fr)`;

                for (let j = 0; j < photosPerPage; j++) {
                    const globalIdx = (p * photosPerPage) + j;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'cell-wrapper';

                    // Dual edge cursor zones
                    wrapper.appendChild(createInsertionZone(globalIdx, 'start'));

                    const cell = document.createElement('div');
                    cell.className = `image-cell ${selectedIndex === globalIdx ? 'selected' : ''}`;
                    cell.onclick = (e) => handleCellClick(e, globalIdx);

                    if (globalIdx < images.length && images[globalIdx]) {
                        const imgData = images[globalIdx];
                        const img = new Image();
                        img.src = imgData.src;
                        img.style.transform = `translate(${imgData.x/5}px, ${imgData.y/5}px) scale(${imgData.zoom/100})`;
                        cell.appendChild(img);

                        // Red X button for selected photo
                        if (selectedIndex === globalIdx) {
                            const del = document.createElement('div');
                            del.className = 'delete-corner-btn';
                            del.innerHTML = '&times;';
                            del.onclick = (e) => { e.stopPropagation(); deletePhoto(globalIdx); };
                            cell.appendChild(del);
                        }
                    }
                    
                    wrapper.appendChild(cell);
                    wrapper.appendChild(createInsertionZone(globalIdx + 1, 'end'));
                    page.appendChild(wrapper);
                }

                if (showPageNums) {
                    const n = document.createElement('div');
                    n.className = 'page-num-label';
                    n.textContent = p + 1;
                    page.appendChild(n);
                }
                previewGrid.appendChild(page);
            }
        }

        function createInsertionZone(idx, posType) {
            const zone = document.createElement('div');
            const posClass = posType === 'end' ? 'absolute -right-[15px]' : 'absolute -left-[15px]';
            // Only show active if insertionIndex matches
            const isActive = insertionIndex === idx;
            zone.className = `top-0 bottom-0 insertion-zone ${posClass} ${isActive ? 'active' : ''}`;
            zone.innerHTML = '<div class="insertion-cursor"></div>';
            zone.onclick = (e) => { e.stopPropagation(); insertionIndex = idx; renderPreview(); };
            return zone;
        }

        generateBtn.onclick = async () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: orientation, unit: 'mm', format: 'a4' });
            generateBtn.disabled = true;
            const originalIcon = generateBtn.innerHTML;
            generateBtn.innerHTML = '<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>';

            const pw = doc.internal.pageSize.getWidth();
            const ph = doc.internal.pageSize.getHeight();
            
            const gap = marginSize;
            const cellW = (pw - (gridCols + 1) * gap) / gridCols;
            const cellH = (ph - (gridRows + 1) * gap) / gridRows;

            for (let i = 0; i < images.length; i++) {
                if (i > 0 && i % photosPerPage === 0) doc.addPage();
                const data = images[i];
                if (!data) continue;

                const pos = i % photosPerPage;
                const col = pos % gridCols;
                const row = Math.floor(pos / gridCols);
                
                const dx = gap + col * (cellW + gap);
                const dy = gap + row * (cellH + gap);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image(); img.src = data.src;
                await new Promise(r => img.onload = r);

                const resolution = 4;
                canvas.width = cellW * resolution * 5; 
                canvas.height = cellH * resolution * 5;
                ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, canvas.width, canvas.height);

                const imgAspect = img.width / img.height;
                const cellAspect = canvas.width / canvas.height;
                let baseW, baseH;
                if (imgAspect > cellAspect) { baseW = canvas.width; baseH = canvas.width / imgAspect; } 
                else { baseH = canvas.height; baseW = canvas.height * imgAspect; }

                const userZoom = data.zoom / 100;
                const drawW = baseW * userZoom;
                const drawH = baseH * userZoom;
                const ox = (canvas.width / 2) + (data.x * resolution) - (drawW / 2);
                const oy = (canvas.height / 2) + (data.y * resolution) - (drawH / 2);

                ctx.drawImage(img, ox, oy, drawW, drawH);
                doc.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', dx, dy, cellW, cellH);

                if (showPageNums && (pos === photosPerPage - 1 || i === images.length - 1)) {
                    doc.setFontSize(10); doc.setTextColor(150, 150, 150);
                    doc.text(`${Math.floor(i / photosPerPage) + 1}`, pw - 5, ph - 8, { align: 'right' });
                }
            }

            doc.save(`Wk-Slide-${Date.now()}.pdf`);
            generateBtn.disabled = false; generateBtn.innerHTML = originalIcon;
        };

        window.onload = () => { initGridPicker(); renderPreview(); };
    </script>
</body>
</html>
